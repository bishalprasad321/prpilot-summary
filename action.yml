name: "PR Pilot Summary"
description: "Automate PR descriptions with AI. Instantly generate intelligent, context-aware summaries of your code changes."

author: "Bishal Prasad"

inputs:
  github_token:
    description: "GitHub token with permissions to read PR details and post comments."
    required: true
  llm_api_key:
    description: "LLM provider API key for generating PR descriptions (for example Groq, Gemini, OpenAI, or another compatible provider)."
    required: true
  llm_provider:
    description: "LLM provider to use. Supported values: auto, groq, openai, openai-compatible, gemini."
    required: false
    default: "auto"
  llm_api_base_url:
    description: "Optional custom API endpoint. Useful for Groq/OpenAI-compatible providers or proxies."
    required: false
    default: ""
  ai_model:
    description: "The AI model to use for generating the PR description (e.g., 'openai/gpt-oss-120b', 'gemini-2.5-flash', 'gpt-4o-mini', or another provider model)."
    required: false
    default: "openai/gpt-oss-120b"
  max_diff_lines:
    description: "Maximum diff lines to process for generating the PR description. If the diff exceeds this limit, a summary will be generated instead."
    required: false
    default: "5000"
  enable_incremental_diff_processing:
    description: "Enable incremental diff processing to handle large diffs by processing them in chunks."
    required: false
    default: "true"
  debug:
    description: "Enable debug mode for more verbose logging during action execution."
    required: false
    default: "true"

# TODO: Consider adding more advanced LLM configuration options in the future, such as maximum_tokens, temperature, top_p, 
# frequency_penalty, presence_penalty, system_prompt, and user_prompt for greater customization of the generated PR descriptions.

  # max_tokens:
  #   description: "Maximum number of tokens for the generated description."
  #   required: false
  #   default: 500
  # temperature:
  #   description: "Temperature setting for the AI model (0.0 to 1.0)."
  #   required: false
  #   default: 0.7
  # top_p:
  #   description: "Top-p setting for nucleus sampling (0.0 to 1.0)."
  #   required: false
  #   default: 0.9
  # frequency_penalty:
  #   description: "Frequency penalty for the AI model (0.0 to 2.0)."
  #   required: false
  #   default: 0.0
  # presence_penalty:
  #   description: "Presence penalty for the AI model (0.0 to 2.0)."
  #   required: false
  #   default: 0.0
  # system_prompt:
  #   description: "System prompt to guide the AI in generating the PR description."
  #   required: false
  #   default: "You are an assistant that generates concise and informative pull request descriptions based on the changes made in the PR. Focus on summarizing the key changes, the purpose of the PR, and any relevant context for reviewers."
  # user_prompt:
  #   description: "User prompt to provide specific instructions or context for the AI when generating the PR description."
  #   required: false
  #   default: "Generate a pull request description based on the following changes:"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "git-pull-request"
  color: "blue"
