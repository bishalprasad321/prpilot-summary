name: Build, Test & Validate Action

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug mode"
        required: false
        default: "false"

# Limit concurrent runs to prevent excessive API usage
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # JOB 1: Build & Quality Checks
  # ============================================================================
  build:
    name: Build & Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify setup
        run: npm run verify

      - name: Type check
        run: npm run typecheck

      - name: Lint & format
        if: matrix.node-version != '16.x'
        run: |
          npm run lint
          npm run format:check

      - name: Verify dist artifact
        run: |
          if [ ! -f dist/index.js ]; then
            echo "Error: dist/index.js not found"
            exit 1
          fi
          echo "dist/index.js exists and is ready"

      - name: Upload build artifact
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5

  # ============================================================================
  # JOB 2: Test the Action (on a sample PR)
  # ============================================================================
  test-action:
    name: Test Action Execution
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Generate PR Description
        id: ai_description
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          llm_api_key: ${{ secrets.GEMINI_API_KEY }}
          llm_provider: gemini
          ai_model: gemini-2.5-flash
          max_diff_lines: "5000"
          enable_incremental_diff_processing: "true"
          debug: ${{ inputs.debug_enabled || 'false' }}
        continue-on-error: true

      - name: Log action output
        if: always()
        run: |
          echo "=== Action Execution Status ==="
          echo "Status: ${{ job.status }}"
          echo "Outcome: ${{ steps.ai_description.outcome }}"
          if [ "${{ steps.ai_description.outcome }}" == "success" ]; then
            echo "Action executed successfully"
          else
            echo "Action encountered an error (this may be expected if no new changes)"
          fi

