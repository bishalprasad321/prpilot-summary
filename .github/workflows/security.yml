name: Security - Dependency & Code Audit

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Single concurrent run is fine for security checks
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Security Audit
  # ============================================================================
  # Runs on schedule (weekly) to check for vulnerabilities.
  # Failure is non-blocking (doesn't prevent merges).
  # Useful for monitoring supply chain security.
  # ============================================================================
  security-audit:
    name: npm Audit & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Show dependencies with funding info
        run: npm fund --json 2>/dev/null | head -20 || echo "No funding info available"

  # ============================================================================
  # SLSA Provenance (Optional - for release security)
  # ============================================================================
  # Generates provenance to prove build integrity.
  # Useful when publishing the action to npm or GitHub releases.
  # ============================================================================
  provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run build

      - name: Generate SLSA provenance metadata
        run: |
          cat > provenance.json <<EOF
          {
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "builder": "GitHub Actions",
            "workflow": "${{ github.workflow }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "branch": "${{ github.ref_name }}",
            "repository": "${{ github.repository }}"
          }
          EOF
          cat provenance.json

      - name: Upload provenance
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: slsa-provenance
          path: provenance.json
          retention-days: 90
